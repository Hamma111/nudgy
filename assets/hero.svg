<svg width="720" height="120" viewBox="0 0 720 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="720" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="hero-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <rect width="720" height="120" rx="14" fill="url(#hero-bg)"/>

  <!-- Pulse icon -->
  <circle cx="60" cy="70" r="7" fill="#f97316"/>
  <path d="M 60 70 m 0 0" fill="none"/>
  <path d="M75 52 A 22 22 0 0 1 80 38" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M85 42 A 36 36 0 0 1 92 24" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M95 32 A 50 50 0 0 1 103 12" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- Text -->
  <text x="140" y="48" font-family="-apple-system, system-ui, sans-serif" font-size="32" font-weight="700" fill="#f5f5f5">Nudgy</text>
  <text x="140" y="72" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#888">A gentle nudge when your AI agent needs you</text>

  <!-- Badges -->
  <g transform="translate(140, 86)">
    <rect width="68" height="20" rx="4" fill="#f97316" opacity="0.15"/>
    <text x="8" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="600" fill="#f59e0b">macOS 14+</text>
  </g>
  <g transform="translate(216, 86)">
    <rect width="106" height="20" rx="4" fill="#4ade80" opacity="0.12"/>
    <text x="8" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="600" fill="#4ade80">Zero Dependencies</text>
  </g>
  <g transform="translate(330, 86)">
    <rect width="90" height="20" rx="4" fill="#60a5fa" opacity="0.12"/>
    <text x="8" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="600" fill="#60a5fa">100% Private</text>
  </g>

  <!-- Privacy lock -->
  <g transform="translate(618, 40)">
    <rect width="80" height="44" rx="8" fill="#222" stroke="#333" stroke-width="0.5"/>
    <text x="12" y="18" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#4ade80">&#x1F512;</text>
    <text x="30" y="18" font-family="-apple-system, system-ui, sans-serif" font-size="9" font-weight="600" fill="#888">Fully Local</text>
    <text x="12" y="34" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#666">No telemetry</text>
  </g>
</svg>
