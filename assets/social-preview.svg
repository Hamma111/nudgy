<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="50%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Glow behind icon -->
  <circle cx="640" cy="200" r="200" fill="url(#glow)"/>

  <!-- Pulse icon -->
  <circle cx="640" cy="200" r="24" fill="#f97316"/>
  <path d="M670 175 A 42 42 0 0 1 678 155" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M688 160 A 65 65 0 0 1 698 135" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M706 145 A 88 88 0 0 1 718 115" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- App name -->
  <text x="640" y="310" font-family="-apple-system, system-ui, 'Helvetica Neue', sans-serif" font-size="72" font-weight="700" fill="#f5f5f5" text-anchor="middle">Nudgy</text>

  <!-- Tagline -->
  <text x="640" y="365" font-family="-apple-system, system-ui, 'Helvetica Neue', sans-serif" font-size="26" fill="#999" text-anchor="middle">Know the moment your AI agent needs you</text>

  <!-- Feature pills -->
  <g transform="translate(640, 420)" text-anchor="middle">
    <!-- macOS -->
    <g transform="translate(-310, 0)">
      <rect x="-55" y="-16" width="110" height="32" rx="16" fill="#f97316" opacity="0.12"/>
      <text y="6" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="middle">macOS 14+</text>
    </g>
    <!-- Open Source -->
    <g transform="translate(-155, 0)">
      <rect x="-60" y="-16" width="120" height="32" rx="16" fill="#4ade80" opacity="0.10"/>
      <text y="6" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#4ade80" text-anchor="middle">Open Source</text>
    </g>
    <!-- Zero Dependencies -->
    <g transform="translate(0, 0)">
      <rect x="-75" y="-16" width="150" height="32" rx="16" fill="#60a5fa" opacity="0.10"/>
      <text y="6" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#60a5fa" text-anchor="middle">Zero Dependencies</text>
    </g>
    <!-- Privacy First -->
    <g transform="translate(155, 0)">
      <rect x="-60" y="-16" width="120" height="32" rx="16" fill="#a78bfa" opacity="0.10"/>
      <text y="6" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">Privacy First</text>
    </g>
    <!-- Claude Code -->
    <g transform="translate(310, 0)">
      <rect x="-60" y="-16" width="120" height="32" rx="16" fill="#fb923c" opacity="0.10"/>
      <text y="6" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fb923c" text-anchor="middle">Claude Code</text>
    </g>
  </g>

  <!-- Description -->
  <text x="640" y="500" font-family="-apple-system, system-ui, 'Helvetica Neue', sans-serif" font-size="18" fill="#666" text-anchor="middle">Native macOS menu bar notifications for AI coding agents</text>

  <!-- GitHub URL -->
  <text x="640" y="580" font-family="-apple-system, system-ui, 'SF Mono', monospace" font-size="16" fill="#555" text-anchor="middle">github.com/Hamma111/nudgy</text>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1278" height="638" rx="0" stroke="#222" stroke-width="1" fill="none"/>
</svg>
